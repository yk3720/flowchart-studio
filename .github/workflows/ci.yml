name: flowchart-studio CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dev tools
        run: pip install -e "python[dev]" ruff pre-commit pytest mypy

      - name: Ruff (excel_normalize)
        run: npm run excel:lint

      - name: mypy (excel_normalize)
        run: npm run excel:mypy

      - name: pre-commit (security + Python hooks)
        run: pre-commit run --all-files --hook-stage pre-commit

      - name: Generate Excel workbooks for pytest
        run: npm run excel:template ; npm run excel:fixture

      - name: pytest (excel_normalize)
        run: npm run excel:test

      - name: Next.js build
        run: npm run build
        env:
          AUTH_DISABLED: "1"

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
      AUTH_DISABLED: "1"
      IMPORT_E2E_STUB: "1"
      RESET_FLOW_E2E_STUB: "1"
      PLAYWRIGHT_E2E: "1"
      PLAYWRIGHT_FORCE_WEBSERVER: "1"
      AXE_GATE: "serious"
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate A0001 scratch xlsx for E2E
        run: pip install -e "python[dev]" ; npm run excel:a0001:scratch

      - name: Next.js build (E2E)
        run: npm run build

      - name: Playwright E2E
        run: npm run test:e2e

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: test-results/axe-report.json
          if-no-files-found: ignore

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
